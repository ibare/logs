<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ibare/logs</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@400;500;600&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface-hover: #16161f;
    --border: #1e1e2e;
    --border-accent: #2a2a3e;
    --text: #c8c8d8;
    --text-dim: #6a6a80;
    --text-muted: #444460;
    --accent: #6c8cff;
    --accent-dim: rgba(108, 140, 255, 0.12);
    --green: #4ae08a;
    --green-dim: rgba(74, 224, 138, 0.1);
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 0 1.5rem;
  }

  /* header */
  header {
    padding: 4rem 0 3rem;
    border-bottom: 1px solid var(--border);
  }

  .prompt {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 0.75rem;
    letter-spacing: 0.02em;
  }

  .prompt .path { color: var(--accent); }
  .prompt .arrow { color: var(--green); margin: 0 0.25rem; }

  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.5rem;
    font-weight: 600;
    color: #e8e8f0;
    letter-spacing: -0.02em;
  }

  h1 .slash { color: var(--text-muted); font-weight: 300; }

  .tagline {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-top: 0.5rem;
    line-height: 1.6;
  }

  /* entry list */
  .entries {
    padding: 2rem 0;
  }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
    padding-left: 0.25rem;
  }

  .entry {
    display: block;
    text-decoration: none;
    color: inherit;
    padding: 1.25rem 1.5rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    margin-bottom: 0.75rem;
    transition: all 0.2s ease;
    position: relative;
  }

  .entry:hover {
    border-color: var(--border-accent);
    background: var(--surface-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
  }

  .entry:hover .entry-title { color: var(--accent); }

  .entry-meta {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
  }

  .entry-tag {
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  .tag-analysis {
    background: var(--accent-dim);
    color: var(--accent);
  }

  .tag-note {
    background: var(--green-dim);
    color: var(--green);
  }

  .entry-date { color: var(--text-muted); }

  .entry-title {
    font-size: 1rem;
    font-weight: 600;
    color: #dddde8;
    line-height: 1.4;
    transition: color 0.2s;
  }

  .entry-desc {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 0.4rem;
    line-height: 1.6;
  }

  .entry-stats {
    display: flex;
    gap: 1rem;
    margin-top: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
  }

  .stat-value { color: var(--text-dim); }

  /* footer */
  footer {
    border-top: 1px solid var(--border);
    padding: 2rem 0 3rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  footer a {
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.2s;
  }

  footer a:hover { color: var(--accent); }

  .cursor {
    display: inline-block;
    width: 7px;
    height: 14px;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 1.2s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  @media (max-width: 600px) {
    header { padding: 2.5rem 0 2rem; }
    h1 { font-size: 1.25rem; }
    .entry { padding: 1rem 1.25rem; }
    .entry-stats { flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="prompt"><span class="path">~/logs</span><span class="arrow">&gt;</span> ls --sort=recent<span class="cursor"></span></div>
    <h1>ibare <span class="slash">/</span> logs</h1>
    <p class="tagline">분석, 실험, 기록 -- 정적 페이지 아카이브</p>
  </header>

  <section class="entries">
    <div class="section-label">// entries</div>

    <a href="./rule-system-analysis/" class="entry">
      <div class="entry-meta">
        <span class="entry-tag tag-analysis">analysis</span>
        <span class="entry-date">2026-04</span>
      </div>
      <div class="entry-title">Rule System Analysis — AI 코딩 에이전트의 규칙 준수 행동 분석</div>
      <div class="entry-desc">7개 프로젝트, 14,988 이벤트, 61개 규칙 파일에서 추출한 AI 코딩 에이전트의 규칙 준수 행동 분석. 규칙 복잡도와 위반율의 관계, 에이전트의 체계적 약점을 데이터로 추적한다.</div>
      <div class="entry-stats">
        <span>projects <span class="stat-value">7</span></span>
        <span>events <span class="stat-value">14,988</span></span>
        <span>rules <span class="stat-value">61</span></span>
      </div>
    </a>

  </section>

  <footer>
    <span>ibare/logs</span>
    <a href="https://github.com/ibare/logs">github</a>
  </footer>
</div>
</body>
</html>
